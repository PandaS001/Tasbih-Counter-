<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>Исламский счетчик зикра | Таспих | Неоновый стиль</title>
    <meta name="description" content="Исламский счетчик для зикра и таспиха. Сохраняйте свой прогресс, переключайте темы, работайте офлайн.">
    <meta name="keywords" content="ислам, зикр, таспих, счетчик, неоновый стиль, офлайн, голосовой счет">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Исламский счетчик зикра">
    <meta property="og:description" content="Красивый неоновый счетчик для зикра с голосовым управлением">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230a0a2a' stroke='%2300ffff' stroke-width='2'/%3E%3Ctext x='16' y='24' font-size='20' text-anchor='middle' fill='%2300ffff' font-family='Arial'%3E🕋%3C/text%3E%3C/svg%3E">
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Манифест для PWA -->
    <link rel="manifest" href="manifest.json">
</head>
<body>    
    <div class="splash-screen">
        <div class="game-icon">🕋</div>
        <div class="splash-text">Исламский счетчик</div>
        <div class="splash-subtext">Зикр & Таспих с голосом</div>
    </div>
    
    <div class="main-page">
        <header>
            <h1>
                <span class="handwriting">Зикр счетчик</span> 
                <span class="game-title-icon">🕋</span>
            </h1>
            <p class="site-description">Считайте зикры голосом или кнопками</p>
            
            <div class="theme-controls">
                <button class="theme-btn" data-theme="dark" id="theme-dark">
                    <span class="theme-icon">🌙</span>
                    <span>Темная</span>
                </button>
                <button class="theme-btn" data-theme="light" id="theme-light">
                    <span class="theme-icon">☀️</span>
                    <span>Светлая</span>
                </button>
            </div>
        </header>
        
        <div class="counter-container">
            <div class="counter-card">
                <div class="counter-header">
                    <h2 class="counter-title">Таспих</h2>
                    <div class="counter-badge" id="counter-name-display">Субханаллах</div>
                </div>
                
                <div class="counter-display">
                    <span class="counter-value" id="counter-value">0</span>
                    <span class="counter-max" id="counter-max">/33</span>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                
                <div class="counter-controls">
                    <button class="counter-btn decrement-btn" id="decrement-btn">
                        <span class="btn-icon">−</span>
                    </button>
                    
                    <button class="counter-btn increment-btn" id="increment-btn">
                        <span class="btn-icon">+</span>
                    </button>
                    
                    <button class="counter-btn reset-btn" id="reset-btn">
                        <span class="btn-icon">↺</span>
                    </button>
                </div>
                
                <div class="voice-control">
                    <button class="voice-btn" id="voice-btn">
                        <span class="voice-icon" id="voice-icon">🎤</span>
                        <span id="voice-text">Включить голосовой счет</span>
                    </button>
                    <div class="voice-status" id="voice-status">Микрофон выключен</div>
                </div>
                
                <div class="counter-presets">
                    <button class="preset-btn" data-preset="33" id="preset-33">33</button>
                    <button class="preset-btn" data-preset="66" id="preset-66">66</button>
                    <button class="preset-btn" data-preset="99" id="preset-99">99</button>
                    <button class="preset-btn" data-preset="100" id="preset-100">100</button>
                    <button class="preset-btn" data-preset="1000" id="preset-1000">1000</button>
                </div>
                
                <div class="zikr-selector">
                    <label for="zikr-select" class="selector-label">Выберите зикр для распознавания:</label>
                    <select id="zikr-select" class="zikr-select">
                        <option value="Субханаллах">Субханаллах</option>
                        <option value="Альхамдулиллях">Альхамдулиллях</option>
                        <option value="Аллаху Акбар">Аллаху Акбар</option>
                        <option value="Ля иляха илля Аллах">Ля иляха илля Аллах</option>
                        <option value="Астагфируллах">Астагфируллах</option>
                        <option value="Субханаллах ва бихамдихи">Субханаллах ва бихамдихи</option>
                        <option value="Ля хауля ва ля куввата илля биллях">Ля хауля ва ля куввата илля биллях</option>
                    </select>
                </div>
                
                <div class="save-controls">
                    <button class="save-btn" id="save-btn">
                        <span class="btn-icon">💾</span>
                        <span>Сохранить</span>
                    </button>
                    <button class="load-btn" id="load-btn">
                        <span class="btn-icon">📂</span>
                        <span>Загрузить</span>
                    </button>
                </div>
            </div>
            
            <div class="history-card">
                <h3 class="history-title">История сохранений</h3>
                <div class="history-controls">
                    <button class="select-all-btn" id="select-all-btn">
                        <span class="btn-icon">✓</span>
                        <span>Выбрать все</span>
                    </button>
                    <button class="delete-selected-btn" id="delete-selected-btn">
                        <span class="btn-icon">🗑️</span>
                        <span>Удалить выбранные</span>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <p class="history-empty">Нет сохраненных записей</p>
                </div>
                <button class="clear-history-btn" id="clear-history">
                    <span class="btn-icon">🗑️</span>
                    <span>Очистить всю историю</span>
                </button>
            </div>
        </div>
        
        <footer class="site-footer">
            <p>© 2026 Исламский счетчик. Для зикра и размышлений.</p>
            <p>Работает без интернета • Голосовое управление</p>
        </footer>
    </div>
    
    <!-- Аудио -->
    <audio id="bgMusic" loop>
        <source src="assets/audio/islamic_music.mp3" type="audio/mpeg">
    </audio>
    
    <div class="music-control" id="music-control">
        <span class="music-icon">🔊</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
