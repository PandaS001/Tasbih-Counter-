<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Зикр счетчик | Таспих с нашидами</title>
    <meta name="description" content="Простой счетчик для зикра с нашидами">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230a0a2a' stroke='%2300ffff' stroke-width='2'/%3E%3Ctext x='16' y='24' font-size='20' text-anchor='middle' fill='%2300ffff' font-family='Arial'%3E🕋%3C/text%3E%3C/svg%3E">
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    
    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>    
    <div class="splash-screen" id="splash">
        <div class="game-icon">🕋</div>
        <div class="splash-text">Зикр счетчик</div>
        <div class="splash-subtext">с нашидами</div>
    </div>
    
    <div class="main-page" id="mainPage" style="display: none;">
        <!-- Бургер меню -->
        <div class="burger-menu" id="burger-menu">
            <div class="burger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <!-- Боковое меню -->
        <div class="side-menu" id="side-menu">
            <div class="menu-header">
                <h3>Меню</h3>
                <button class="close-menu" id="close-menu">✕</button>
            </div>
            
            <div class="menu-section">
                <h4>Тема</h4>
                <div class="theme-menu-controls">
                    <button class="menu-theme-btn active" id="theme-dark">🌙 Темная</button>
                    <button class="menu-theme-btn" id="theme-light">☀️ Светлая</button>
                </div>
            </div>
            
            <div class="menu-section">
                <h4>Ваш зикр</h4>
                <input type="text" id="custom-zikr" class="custom-zikr-input" value="Субханаллах">
            </div>
            
            <div class="menu-section">
                <h4>Лимит</h4>
                <div class="menu-presets">
                    <button class="menu-preset-btn" data-limit="33">33</button>
                    <button class="menu-preset-btn" data-limit="66">66</button>
                    <button class="menu-preset-btn" data-limit="99">99</button>
                    <button class="menu-preset-btn" data-limit="100">100</button>
                    <button class="menu-preset-btn" data-limit="1000">1000</button>
                </div>
            </div>
            
            <div class="menu-section">
                <h4>Нашиды</h4>
                <select id="nasheed-select" class="nasheed-select">
                    <option value="none">🔇 Без звука</option>
                    <option value="nasheed1">🎵 Нашид 1 - Спокойный</option>
                    <option value="nasheed2">🎵 Нашид 2 - Красивый</option>
                    <option value="nasheed3">🎵 Нашид 3 - Вдохновляющий</option>
                </select>
                <div class="volume-control">
                    <span>🔈</span>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
                    <span>🔊</span>
                </div>
            </div>
            
            <div class="menu-section">
                <h4>История</h4>
                <button class="menu-btn" id="show-history">📋 Показать сохранения</button>
            </div>
        </div>
        
        <!-- Основной счетчик -->
        <div class="counter-main">
            <div class="zikr-badge" id="zikrDisplay">Субханаллах</div>
            
            <div class="big-number" id="countDisplay">0</div>
            <div class="limit-number" id="limitDisplay">/33</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="action-row">
                <button class="action-btn minus-btn" id="minusBtn">−</button>
                <button class="action-btn voice-btn" id="voiceBtn">
                    <span class="voice-icon" id="voiceIcon">🎤</span>
                </button>
                <button class="action-btn plus-btn" id="plusBtn">+</button>
            </div>
            
            <button class="reset-btn" id="resetBtn">↺ Сбросить</button>
            
            <div class="voice-status" id="voiceStatus">🎤 Выкл</div>
        </div>
        
        <!-- Модалка истории -->
        <div class="modal" id="historyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Сохранения</h3>
                    <button class="close-modal" id="closeHistory">✕</button>
                </div>
                
                <div class="history-actions">
                    <button class="history-action" id="saveCurrent">💾 Сохранить</button>
                    <button class="history-action" id="deleteSelected">🗑️ Удалить</button>
                </div>
                
                <div class="history-list" id="historyList">
                    <p class="history-empty">Нет сохранений</p>
                </div>
                
                <button class="clear-all" id="clearAll">🗑️ Очистить все</button>
            </div>
        </div>
    </div>
    
    <!-- Аудио элементы -->
    <audio id="audioPlayer" loop preload="none"></audio>

    <script src="script.js"></script>
</body>
</html>
